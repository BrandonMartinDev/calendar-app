name: DEV_calendar-app

services:


  database:
    image: mongo
    restart: unless-stopped
    env_file: ./server/.env
    networks:
      - calendar-network
    volumes:
      - calendar-database:/data/db


  server:
    restart: unless-stopped
    env_file: ./server/.env
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    networks:
      - calendar-network
    ports:
      - 3000:3000
    volumes:
      - ./server:/app
      - ./server/node_modules:/app/node_modules
      - ./shared:/shared
    depends_on:
      - database

    
  client:
    restart: unless-stopped
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    networks:
      - calendar-network
    ports: 
      - 5173:5173
    volumes:
      - ./client:/app
      - ./client/node_modules:/app/node_modules
      - ./shared:/shared
    depends_on:
      - server


networks:
  calendar-network:
    driver: bridge


volumes:
  calendar-database: