name: DEV_calendar-app

services:

  database:
    image: mongo
    restart: unless-stopped
    env_file: ../.env
    networks:
      - dev-calendar-network
    volumes:
      - ../data:/data/db


  server:
    restart: unless-stopped
    env_file: ../.env
    build:
      context: ../server
      dockerfile: Dockerfile.dev
    networks:
      - dev-calendar-network
    ports:
      - 8080:8080
    volumes:
      - ../server:/app
      - ../server/node_modules:/app/node_modules
      - ../shared:/shared
    depends_on:
      - database

    
  client:
    restart: unless-stopped
    env_file: ../.env
    build:
      context: ../client
      dockerfile: Dockerfile.dev
    networks:
      - dev-calendar-network
    ports: 
      - 5173:5173
    volumes:
      - ../client:/app
      - ../client/node_modules:/app/node_modules
      - ../shared:/shared
    depends_on:
      - server


networks:
  dev-calendar-network:
    driver: bridge