name: calendar-app

services:

  database:
    image: mongo
    restart: unless-stopped
    env_file: ../.env
    networks:
      - calendar-network
    volumes:
      - ../data:/data/db


  server:
    restart: unless-stopped
    env_file: ../.env
    image: brandonmartindev/calendar-server
    networks:
      - calendar-network
    ports:
      - 8080:8080
    depends_on:
      - database

    
  client:
    restart: unless-stopped
    env_file: ../.env
    image: brandonmartindev/calendar-client
    networks:
      - calendar-network
    ports: 
      - 80:80
    depends_on:
      - server


networks:
  calendar-network:
    driver: bridge